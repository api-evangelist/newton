aid: newton
name: Newton
description: >-
  Newton is a Linux Foundation open source physics engine, contributed by Disney
  Research, NVIDIA, and Google DeepMind. Built on NVIDIA Warp and integrating
  MuJoCo Warp as a backend, Newton targets roboticists and simulation
  researchers, providing GPU-accelerated, differentiable, OpenUSD-compatible
  physics simulation for AI training, robotics, gaming, and scientific research.
